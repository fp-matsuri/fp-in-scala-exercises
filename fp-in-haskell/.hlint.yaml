# ラムダ式を簡略化する警告を抑制
# 例: `\x -> x + 1` → `(+ 1)`
- ignore: { name: "Avoid lambda using `infix`" }

# タプルを受け取るラムダ式の簡略化の警告を抑制
# 例: `\(a, b) -> a * b` → `uncurry (*)`
- ignore: { name: "Use uncurry" }

# イータ簡約の警告を抑制
# 例: `partial1 x f y = f x y` → `partial1 x f = f x`
- ignore: { name: "Eta reduce" }

# 冗長な if 式の警告を抑制
# 例: `if c then False else e` → `not c && e`
- ignore: { name: "Redundant if" }

# ラムダ式をポイントフリー形式へ簡略化する警告を抑制
# 例: `\x acc -> Cons (show x) acc` → `Cons . show`、`\acc h -> Cons h acc` → `flip Cons`
# `foldRight`/`foldLeft` に渡す関数の引数(累積値と要素)を明示した形のほうが、
# 畳み込みの動きを追いやすいと考え、あえてポイントフリーにしない
- ignore: { name: "Avoid lambda" }

# concat . map を concatMap へ簡略化する警告を抑制
# `flatMap` は演習の意図として、既存の `concat` と `map` を組み合わせて定義することを求めているため、
# 単一の `concatMap` にまとめない
- ignore: { name: "Use concatMap" }

# traverse id を sequenceA へ簡略化する警告を抑制
# `sequence` を `traverse` を用いて定義するのが演習の意図であり、また `Either`/`Validated`/`Option` は
# 独自定義の具体的な関数であって Traversable/Applicative のインスタンスではないため、
# 汎用の `sequenceA` に単純に置き換えることはできない
- ignore: { name: "Use sequenceA" }

# 明示的なパターンマッチ再帰を foldr へ簡略化する警告を抑制
# `sequence` の素直な再帰実装(foldRightを使わない版)を主たる解答としているため
- ignore: { name: "Use foldr" }

# traverse を traverse_ へ簡略化する警告を抑制
# `Candy.simulateMachine` で使う `traverse` はこの章(6.10)で自作した State.traverse であり、
# Prelude/Data.Foldable の汎用 `traverse_` とは無関係の別物のため置き換えられない
- ignore: { name: "Use traverse_" }

# ラムダ式をタプルセクションへ簡略化する警告を抑制
# 例: `\s -> (a, s)` → `(a,)`(要 TupleSections 拡張)。この教材では新たな言語拡張を
# 増やしてまで簡略化するより、明示的なラムダのほうが読みやすいと考える
- ignore: { name: "Use tuple-section" }
